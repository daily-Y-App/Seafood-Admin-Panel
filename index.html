<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#DC2626">
    <title>Admin - Seafood Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #DC2626 0%, #991B1B 100%);
            min-height: 100vh;
            padding: 1rem;
        }

        .admin-header {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .admin-title {
            font-size: 2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .admin-subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }

        .tab.active {
            background: white;
            color: #DC2626;
            box-shadow: 0 4px 16px rgba(255,255,255,0.3);
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #DC2626;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1E293B;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #DC2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .btn {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #DC2626 0%, #991B1B 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4);
        }

        .btn-success {
            background: #10B981;
            color: white;
        }

        .btn-danger {
            background: #EF4444;
            color: white;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .btn-full {
            width: 100%;
        }

        .order-item, .attendance-item {
            background: #F8FAFC;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 2px solid #E2E8F0;
            transition: all 0.3s;
        }

        .order-item:hover, .attendance-item:hover {
            border-color: #DC2626;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.1);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .order-id {
            font-weight: 700;
            color: #DC2626;
            font-size: 1.1rem;
        }

        .status-badge {
            padding: 0.375rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .status-cleaning { background: #FEF3C7; color: #92400E; }
        .status-packed { background: #DBEAFE; color: #1E40AF; }
        .status-delivering { background: #E0E7FF; color: #4338CA; }
        .status-completed { background: #D1FAE5; color: #065F46; }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }

        select {
            padding: 0.5rem;
            border: 2px solid #E2E8F0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #64748B;
        }

        .success-message {
            background: #D1FAE5;
            color: #065F46;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-weight: 600;
            display: none;
        }

        .hidden {
            display: none !important;
        }

        .stats-banner {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 16px;
            color: white;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .admin-title {
                font-size: 1.5rem;
            }
            .input-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Admin Header -->
        <div class="admin-header">
            <div class="admin-title">👨‍💼 Admin Control Panel</div>
            <div class="admin-subtitle">Direct Firebase Management - No Login Required</div>
        </div>

        <!-- Stats -->
        <div class="stats-banner">
            <div class="stat-box">
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-label">📦 Total Orders</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="todayAttendance">0</div>
                <div class="stat-label">📋 Today Attendance</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="activeOrders">0</div>
                <div class="stat-label">🔥 Active Orders</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('schedule')">⏰ Schedule</button>
            <button class="tab" onclick="showTab('targets')">🎯 Targets</button>
            <button class="tab" onclick="showTab('orders')">📦 Orders</button>
            <button class="tab" onclick="showTab('attendance')">📋 Attendance</button>
        </div>

        <!-- Success Message -->
        <div class="success-message" id="successMessage"></div>

        <!-- Schedule Tab -->
        <div class="tab-content" id="scheduleTab">
            <div class="card">
                <div class="card-title">⏰ Update Work Schedule</div>
                <div class="input-grid">
                    <div class="form-group">
                        <label class="form-label">Start Time</label>
                        <input type="time" class="form-input" id="startTime" value="08:00">
                    </div>
                    <div class="form-group">
                        <label class="form-label">End Time</label>
                        <input type="time" class="form-input" id="endTime" value="17:00">
                    </div>
                </div>
                <button class="btn btn-primary btn-full" onclick="updateSchedule()">
                    💾 Update & Push to Clients
                </button>
            </div>
        </div>

        <!-- Targets Tab -->
        <div class="tab-content hidden" id="targetsTab">
            <div class="card">
                <div class="card-title">🎯 Set Daily Targets</div>
                <div class="input-grid">
                    <div class="form-group">
                        <label class="form-label">🦐 ကင်းမွန် (အလုံး)</label>
                        <input type="number" class="form-input" id="shrimpTarget" value="100" min="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">🦑 ပုဇွန် (အလုံး)</label>
                        <input type="number" class="form-input" id="squidTarget" value="50" min="0">
                    </div>
                </div>
                <button class="btn btn-primary btn-full" onclick="updateTargets()">
                    💾 Update & Push to Clients
                </button>
            </div>
        </div>

        <!-- Orders Tab -->
        <div class="tab-content hidden" id="ordersTab">
            <div class="card">
                <div class="card-title">📝 Create New Order</div>
                <div class="input-grid">
                    <div class="form-group">
                        <label class="form-label">Customer Name</label>
                        <input type="text" class="form-input" id="customerName" placeholder="Enter name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Item Type</label>
                        <select class="form-input" id="itemType">
                            <option value="shrimp">🦐 ကင်းမွန်</option>
                            <option value="squid">🦑 ပုဇွန်</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Quantity (အလုံး)</label>
                        <input type="number" class="form-input" id="quantity" value="10" min="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Assigned To</label>
                        <input type="text" class="form-input" id="assignedTo" placeholder="Team name">
                    </div>
                </div>
                <button class="btn btn-primary btn-full" onclick="createOrder()">
                    ➕ Create Order
                </button>
            </div>

            <div class="card">
                <div class="card-title">📦 All Orders</div>
                <div id="ordersContainer" class="loading">Loading...</div>
            </div>
        </div>

        <!-- Attendance Tab -->
        <div class="tab-content hidden" id="attendanceTab">
            <div class="card">
                <div class="card-title">📋 Today's Attendance</div>
                <div id="attendanceContainer" class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where, orderBy, onSnapshot } 
            from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Firebase Config (Same as User App)
        const firebaseConfig = {
            apiKey: "AIzaSyC4ncNhlETbAgB5uFbEiXRON-3vhfneEV0",
            authDomain: "seafood-oder.firebaseapp.com",
            projectId: "seafood-oder",
            storageBucket: "seafood-oder.firebasestorage.app",
            messagingSenderId: "428949391732",
            appId: "1:428949391732:web:908e851d89aff17365c421",
            measurementId: "G-GNP9K51MCY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.firestore = { collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where, orderBy, onSnapshot };
        
        console.log("✅ Firebase Admin connected!");
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script>
        // Initialize
        window.addEventListener('firebaseReady', () => {
            loadOrders();
            loadAttendance();
            updateStats();
            setupRealtimeListeners();
        });

        // Real-time listeners
        function setupRealtimeListeners() {
            const { collection, onSnapshot } = window.firestore;
            
            onSnapshot(collection(window.db, 'orders'), () => {
                loadOrders();
                updateStats();
            });
            
            onSnapshot(collection(window.db, 'attendance'), () => {
                loadAttendance();
                updateStats();
            });
        }

        // Tab switching
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.remove('hidden');
            
            if (tabName === 'orders') loadOrders();
            if (tabName === 'attendance') loadAttendance();
        }

        // Success message
        function showSuccess(message) {
            const msg = document.getElementById('successMessage');
            msg.textContent = '✅ ' + message;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        // Update Schedule
        async function updateSchedule() {
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;

            try {
                const { collection, addDoc } = window.firestore;
                await addDoc(collection(window.db, 'workSchedules'), {
                    startTime,
                    endTime,
                    createdAt: new Date().toISOString(),
                    updatedBy: 'admin'
                });
                showSuccess('Schedule updated! Clients will see the change immediately.');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Update Targets
        async function updateTargets() {
            const shrimp = parseInt(document.getElementById('shrimpTarget').value);
            const squid = parseInt(document.getElementById('squidTarget').value);

            try {
                const { collection, addDoc } = window.firestore;
                await addDoc(collection(window.db, 'dailyTargets'), {
                    date: new Date().toISOString().split('T')[0],
                    shrimp,
                    squid,
                    createdAt: new Date().toISOString()
                });
                showSuccess('Targets updated! Clients will see the change immediately.');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Create Order
        async function createOrder() {
            const customer = document.getElementById('customerName').value.trim();
            const item = document.getElementById('itemType').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            const assignedTo = document.getElementById('assignedTo').value.trim();

            if (!customer) {
                alert('Customer name required!');
                return;
            }

            try {
                const { collection, addDoc } = window.firestore;
                await addDoc(collection(window.db, 'orders'), {
                    orderNumber: 'ORD-' + Date.now().toString().slice(-6),
                    customer,
                    item,
                    quantity,
                    status: 'cleaning',
                    assignedTo: assignedTo || 'Unassigned',
                    createdAt: new Date().toISOString()
                });

                document.getElementById('customerName').value = '';
                document.getElementById('quantity').value = '10';
                document.getElementById('assignedTo').value = '';

                showSuccess('Order created successfully!');
                loadOrders();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Load Orders
        async function loadOrders() {
            const container = document.getElementById('ordersContainer');
            
            try {
                const { collection, getDocs, orderBy, query } = window.firestore;
                const q = query(collection(window.db, 'orders'), orderBy('createdAt', 'desc'));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    container.innerHTML = '<div class="loading">No orders yet</div>';
                    return;
                }

                let html = '';
                snapshot.forEach((doc) => {
                    const order = doc.data();
                    const statusClass = `status-${order.status}`;
                    const itemEmoji = order.item === 'shrimp' ? '🦐' : '🦑';
                    const itemName = order.item === 'shrimp' ? 'ကင်းမွန်' : 'ပုဇွန်';

                    html += `
                        <div class="order-item">
                            <div class="order-header">
                                <div class="order-id">${order.orderNumber}</div>
                                <span class="status-badge ${statusClass}">${order.status}</span>
                            </div>
                            <div style="margin-bottom: 0.75rem;">
                                <strong>Customer:</strong> ${order.customer}<br>
                                <strong>Item:</strong> ${itemEmoji} ${itemName} ${order.quantity} အလုံး<br>
                                <strong>Assigned:</strong> ${order.assignedTo}
                            </div>
                            <div class="action-buttons">
                                <select onchange="updateOrderStatus('${doc.id}', this.value)">
                                    <option value="cleaning" ${order.status === 'cleaning' ? 'selected' : ''}>Cleaning</option>
                                    <option value="packed" ${order.status === 'packed' ? 'selected' : ''}>Packed</option>
                                    <option value="delivering" ${order.status === 'delivering' ? 'selected' : ''}>Delivering</option>
                                    <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Completed</option>
                                </select>
                                <button class="btn btn-danger" onclick="deleteOrder('${doc.id}')">🗑️</button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = '<div class="loading">Error: ' + error.message + '</div>';
            }
        }

        // Update Order Status
        async function updateOrderStatus(orderId, newStatus) {
            try {
                const { doc, updateDoc } = window.firestore;
                await updateDoc(doc(window.db, 'orders', orderId), {
                    status: newStatus,
                    updatedAt: new Date().toISOString()
                });
                showSuccess('Order status updated!');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Delete Order
        async function deleteOrder(orderId) {
            if (!confirm('Delete this order?')) return;

            try {
                const { doc, deleteDoc } = window.firestore;
                await deleteDoc(doc(window.db, 'orders', orderId));
                showSuccess('Order deleted!');
                loadOrders();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Load Attendance
        async function loadAttendance() {
            const container = document.getElementById('attendanceContainer');
            
            try {
                const { collection, getDocs, query, where } = window.firestore;
                const today = new Date().toISOString().split('T')[0];
                const q = query(collection(window.db, 'attendance'), where('date', '==', today));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    container.innerHTML = '<div class="loading">No attendance records today</div>';
                    return;
                }

                let html = '';
                snapshot.forEach((doc) => {
                    const att = doc.data();
                    const checkIn = att.checkIn ? new Date(att.checkIn).toLocaleTimeString() : '--';
                    const checkOut = att.checkOut ? new Date(att.checkOut).toLocaleTimeString() : '--';

                    html += `
                        <div class="attendance-item">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <strong>${att.staffName}</strong><br>
                                    <span style="font-size: 0.875rem; color: #64748B;">
                                        In: ${checkIn} | Out: ${checkOut}
                                    </span>
                                </div>
                                <button class="btn btn-danger" onclick="deleteAttendance('${doc.id}')">🗑️</button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = '<div class="loading">Error: ' + error.message + '</div>';
            }
        }

        // Delete Attendance
        async function deleteAttendance(id) {
            if (!confirm('Delete this record?')) return;

            try {
                const { doc, deleteDoc } = window.firestore;
                await deleteDoc(doc(window.db, 'attendance', id));
                showSuccess('Record deleted!');
                loadAttendance();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Update Stats
        async function updateStats() {
            try {
                const { collection, getDocs, query, where } = window.firestore;
                
                const ordersSnapshot = await getDocs(collection(window.db, 'orders'));
                const activeCount = ordersSnapshot.docs.filter(d => d.data().status !== 'completed').length;
                
                const today = new Date().toISOString().split('T')[0];
                const attSnapshot = await getDocs(
                    query(collection(window.db, 'attendance'), where('date', '==', today))
                );

                document.getElementById('totalOrders').textContent = ordersSnapshot.size;
                document.getElementById('activeOrders').textContent = activeCount;
                document.getElementById('todayAttendance').textContent = attSnapshot.size;
            } catch (error) {
                console.error('Stats error:', error);
            }
        }
    </script>
</body>
</html>
