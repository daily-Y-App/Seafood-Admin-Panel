<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#DC2626">
    <title>Admin - Seafood Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #DC2626 0%, #991B1B 100%);
            min-height: 100vh;
        }

        /* LOCK SCREEN */
        .lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #DC2626 0%, #991B1B 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 2rem;
        }

        .lock-screen.hidden {
            display: none !important;
        }

        .lock-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
        }

        .lock-title {
            color: white;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .lock-subtitle {
            color: rgba(255,255,255,0.7);
            margin-bottom: 2rem;
        }

        .lock-input {
            width: 100%;
            max-width: 350px;
            padding: 1.2rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            font-size: 1.3rem;
            background: rgba(255,255,255,0.1);
            color: white;
            text-align: center;
            letter-spacing: 0.5rem;
            margin-bottom: 1.5rem;
            font-weight: bold;
        }

        .lock-input:focus {
            outline: none;
            border-color: white;
            background: rgba(255,255,255,0.2);
        }

        .lock-btn {
            width: 100%;
            max-width: 350px;
            padding: 1rem;
            background: white;
            color: #DC2626;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .lock-error {
            color: #FCA5A5;
            text-align: center;
            margin-top: 1rem;
            display: none;
            font-weight: 600;
        }

        /* MAIN APP */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        .header {
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .lock-btn-header {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #DC2626;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #64748B;
            margin-top: 0.5rem;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }

        .tab.active {
            background: white;
            color: #DC2626;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #DC2626;
            margin-bottom: 1.5rem;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 0.5rem;
        }

        .form-input, select {
            padding: 0.8rem;
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            font-size: 1rem;
        }

        .form-input:focus, select:focus {
            outline: none;
            border-color: #DC2626;
        }

        .btn {
            padding: 0.9rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #DC2626 0%, #991B1B 100%);
            color: white;
            width: 100%;
        }

        .btn-danger {
            background: #EF4444;
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            width: auto;
        }

        .success-msg {
            background: #D1FAE5;
            color: #065F46;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
            font-weight: 600;
        }

        .order-item {
            background: #F8FAFC;
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .order-id {
            font-weight: 700;
            color: #DC2626;
        }

        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-cleaning { background: #FEF3C7; color: #92400E; }
        .status-packed { background: #DBEAFE; color: #1E40AF; }
        .status-delivering { background: #E0E7FF; color: #4338CA; }
        .status-completed { background: #D1FAE5; color: #065F46; }

        .order-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        .order-actions select {
            flex: 1;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #64748B;
        }
    </style>
</head>
<body>
    <!-- LOCK SCREEN -->
    <div class="lock-screen" id="lockScreen">
        <div class="lock-icon">🔒</div>
        <div class="lock-title">Admin Panel</div>
        <div class="lock-subtitle">Enter PIN: Admin</div>
        <input 
            type="password" 
            class="lock-input" 
            id="lockPin" 
            placeholder="00000000"
            maxlength="8"
            autofocus
        >
        <button class="lock-btn" onclick="checkPin()">Unlock</button>
        <div class="lock-error" id="lockError">🔑😬❌ Wrong PIN</div>
    </div>

    <!-- MAIN APP -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <div class="header-title">👨‍💼 Admin Panel</div>
            </div>
            <button class="lock-btn-header" onclick="logout()">🔒 Lock</button>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-number" id="totalOrders">0</div>
                <div class="stat-label">📦 Total Orders</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="activeOrders">0</div>
                <div class="stat-label">🔥 Active</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="completed">0</div>
                <div class="stat-label">✅ Completed</div>
            </div>
        </div>

        <!-- Messages -->
        <div class="success-msg" id="successMsg"></div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('orders')">📦 Orders</button>
            <button class="tab" onclick="switchTab('schedule')">⏰ Schedule</button>
            <button class="tab" onclick="switchTab('targets')">🎯 Targets</button>
        </div>

        <!-- Orders Tab -->
        <div id="orders" class="tab-content active">
            <div class="card">
                <div class="card-title">➕ Create New Order</div>
                <div class="input-grid">
                    <div class="form-group">
                        <label class="form-label">Customer Name</label>
                        <input type="text" class="form-input" id="customerName" placeholder="Name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Item Type</label>
                        <select class="form-input" id="itemType">
                            <option value="shrimp">🦑 ကင်းမွန်းပု</option>
                            <option value="squid">🦐ပုဇွန်ကင်</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Quantity</label>
                        <input type="number" class="form-input" id="quantity" value="10" min="1">
                    </div>
                </div>
                <button class="btn" onclick="createOrder()">📝 Create Order</button>
            </div>

            <div class="card">
                <div class="card-title">📦 All Orders</div>
                <div id="ordersContainer" class="loading">No orders</div>
            </div>
        </div>

        <!-- Schedule Tab -->
        <div id="schedule" class="tab-content">
            <div class="card">
                <div class="card-title">⏰ Work Schedule</div>
                <div class="input-grid">
                    <div class="form-group">
                        <label class="form-label">Start Time</label>
                        <input type="time" class="form-input" id="startTime" value="08:00">
                    </div>
                    <div class="form-group">
                        <label class="form-label">End Time</label>
                        <input type="time" class="form-input" id="endTime" value="17:00">
                    </div>
                </div>
                <button class="btn" onclick="updateSchedule()">💾 Save Schedule</button>
            </div>
        </div>

        <!-- Targets Tab -->
        <div id="targets" class="tab-content">
            <div class="card">
                <div class="card-title">🎯 Daily Targets</div>
                <div class="input-grid">
                    <div class="form-group">
                        <label class="form-label">🦐 ပုဇွန်</label>
                        <input type="number" class="form-input" id="shrimpTarget" value="100" min="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">🦑 ကင်းမွန်</label>
                        <input type="number" class="form-input" id="squidTarget" value="50" min="0">
                    </div>
                </div>
                <button class="btn" onclick="updateTargets()">💾 Save Targets</button>
            </div>
        </div>
    </div>

    <script>
        // ========== LOCK SYSTEM ==========
        function checkPin() {
            const pin = document.getElementById('lockPin').value;
            if (pin === '31707848') {
                document.getElementById('lockScreen').classList.add('hidden');
                loadOrders();
                updateStats();
            } else {
                document.getElementById('lockError').style.display = 'block';
                document.getElementById('lockPin').value = '';
                setTimeout(() => {
                    document.getElementById('lockError').style.display = 'none';
                }, 2000);
            }
        }

        function logout() {
            document.getElementById('lockScreen').classList.remove('hidden');
            document.getElementById('lockPin').value = '';
            document.getElementById('lockPin').focus();
        }

        document.getElementById('lockPin').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPin();
        });

        // ========== UTILITY ==========
        function switchTab(name) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            event.target.classList.add('active');
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = '✅ ' + msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2000);
        }

        // ========== CRUD ==========
        function createOrder() {
            const name = document.getElementById('customerName').value.trim();
            const item = document.getElementById('itemType').value;
            const qty = document.getElementById('quantity').value;

            if (!name) {
                alert('Enter customer name');
                return;
            }

            const order = {
                id: Date.now(),
                customer: name,
                item: item,
                quantity: qty,
                status: 'cleaning',
                createdAt: new Date().toLocaleString()
            };

            let orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));

            document.getElementById('customerName').value = '';
            document.getElementById('quantity').value = '10';
            
            showSuccess('Order created!');
            loadOrders();
            updateStats();
        }

        function loadOrders() {
            const container = document.getElementById('ordersContainer');
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');

            if (orders.length === 0) {
                container.innerHTML = '<div class="loading">No orders</div>';
                return;
            }

            let html = '';
            orders.forEach(order => {
                const itemEmoji = order.item === 'shrimp' ? '🦐' : '🦑';
                const itemName = order.item === 'shrimp' ? 'ပုဇွန်' : 'ကင်းမွန်';

                html += `
                    <div class="order-item">
                        <div class="order-header">
                            <div class="order-id">#${order.id}</div>
                            <span class="status-badge status-${order.status}">${order.status}</span>
                        </div>
                        <div style="margin-bottom: 0.8rem;">
                            <strong>${order.customer}</strong><br>
                            ${itemEmoji} ${itemName} × ${order.quantity}
                        </div>
                        <div class="order-actions">
                            <select onchange="updateStatus(${order.id}, this.value)">
                                <option value="cleaning" ${order.status === 'cleaning' ? 'selected' : ''}>Cleaning</option>
                                <option value="packed" ${order.status === 'packed' ? 'selected' : ''}>Packed</option>
                                <option value="delivering" ${order.status === 'delivering' ? 'selected' : ''}>Delivering</option>
                                <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Completed</option>
                            </select>
                            <button class="btn btn-danger" onclick="deleteOrder(${order.id})">🗑️</button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function updateStatus(id, status) {
            let orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders = orders.map(o => o.id === id ? {...o, status: status} : o);
            localStorage.setItem('orders', JSON.stringify(orders));
            showSuccess('Status updated!');
            updateStats();
        }

        function deleteOrder(id) {
            if (confirm('Delete this order?')) {
                let orders = JSON.parse(localStorage.getItem('orders') || '[]');
                orders = orders.filter(o => o.id !== id);
                localStorage.setItem('orders', JSON.stringify(orders));
                showSuccess('Order deleted!');
                loadOrders();
                updateStats();
            }
        }

        function updateSchedule() {
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            localStorage.setItem('schedule', JSON.stringify({start, end}));
            showSuccess('Schedule saved!');
        }

        function updateTargets() {
            const shrimp = document.getElementById('shrimpTarget').value;
            const squid = document.getElementById('squidTarget').value;
            localStorage.setItem('targets', JSON.stringify({shrimp, squid}));
            showSuccess('Targets saved!');
        }

        function updateStats() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const active = orders.filter(o => o.status !== 'completed').length;
            const comp = orders.filter(o => o.status === 'completed').length;

            document.getElementById('totalOrders').textContent = orders.length;
            document.getElementById('activeOrders').textContent = active;
            document.getElementById('completed').textContent = comp;
        }

        // Initialize
        updateStats();
    </script>
</body>
</html>
