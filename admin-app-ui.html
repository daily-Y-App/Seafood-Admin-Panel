<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1E3A8A">
    <title>Admin Panel - Seafood Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-subtitle {
            color: #64748B;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1E293B;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: #FEE2E2;
            color: #DC2626;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }

        .dashboard {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1200px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #E2E8F0;
        }

        .dashboard-title {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-logout {
            padding: 0.5rem 1rem;
            background: #EF4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            overflow-x: auto;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            border: none;
            background: #F1F5F9;
            color: #64748B;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: #F8FAFC;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #1E293B;
        }

        .input-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .btn-success {
            background: #10B981;
            color: white;
        }

        .btn-danger {
            background: #EF4444;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .order-item {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 2px solid #E2E8F0;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .order-id {
            font-weight: 600;
            color: #1E3A8A;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .status-cleaning { background: #FEF3C7; color: #92400E; }
        .status-packed { background: #DBEAFE; color: #1E40AF; }
        .status-delivering { background: #E0E7FF; color: #4338CA; }
        .status-completed { background: #D1FAE5; color: #065F46; }

        select {
            padding: 0.5rem;
            border: 2px solid #E2E8F0;
            border-radius: 8px;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #64748B;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .login-container, .dashboard {
                border-radius: 0;
                min-height: 100vh;
            }

            .input-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-container" id="loginContainer">
        <div class="logo">
            <div class="logo-icon">🦐</div>
            <div class="logo-text">Admin Panel</div>
            <div class="logo-subtitle">Seafood Manager</div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="emailInput" placeholder="admin@seafood.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="passwordInput" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-primary" id="loginBtn">
                🔐 Login as Admin
            </button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem; color: #64748B;">
            <strong>API Server:</strong> <span id="apiServerDisplay">Not configured</span>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <div>
                <div class="dashboard-title">👨‍💼 Admin Dashboard</div>
                <div style="color: #64748B; font-size: 0.875rem;">Welcome, <span id="adminEmail"></span></div>
            </div>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="schedule">⏰ Schedule</button>
            <button class="tab" data-tab="targets">🎯 Targets</button>
            <button class="tab" data-tab="orders">📦 Orders</button>
            <button class="tab" data-tab="attendance">📋 Attendance</button>
        </div>

        <!-- Schedule Tab -->
        <div class="tab-content active" id="scheduleTab">
            <div class="card">
                <div class="card-title">⏰ Update Work Schedule</div>
                <div class="input-group">
                    <div>
                        <label class="form-label">Start Time</label>
                        <input type="time" class="form-input" id="startTime" value="08:00">
                    </div>
                    <div>
                        <label class="form-label">End Time</label>
                        <input type="time" class="form-input" id="endTime" value="17:00">
                    </div>
                </div>
                <button class="btn btn-success" onclick="updateSchedule()">💾 Update Schedule</button>
            </div>
        </div>

        <!-- Targets Tab -->
        <div class="tab-content" id="targetsTab">
            <div class="card">
                <div class="card-title">🎯 Set Daily Targets</div>
                <div class="input-group">
                    <div>
                        <label class="form-label">🦐 ကင်းမွန် (အလုံး)</label>
                        <input type="number" class="form-input" id="shrimpTarget" value="100" min="0">
                    </div>
                    <div>
                        <label class="form-label">🦑 ပုဇွန် (အလုံး)</label>
                        <input type="number" class="form-input" id="squidTarget" value="50" min="0">
                    </div>
                </div>
                <button class="btn btn-success" onclick="updateTargets()">💾 Update Targets</button>
            </div>
        </div>

        <!-- Orders Tab -->
        <div class="tab-content" id="ordersTab">
            <div class="card">
                <div class="card-title">📝 Create New Order</div>
                <div class="input-group">
                    <div>
                        <label class="form-label">Customer Name</label>
                        <input type="text" class="form-input" id="customerName" placeholder="Customer name">
                    </div>
                    <div>
                        <label class="form-label">Item Type</label>
                        <select class="form-input" id="itemType">
                            <option value="shrimp">🦐 ကင်းမွန်</option>
                            <option value="squid">🦑 ပုဇွန်</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label">Quantity (အလုံး)</label>
                        <input type="number" class="form-input" id="quantity" value="10" min="1">
                    </div>
                    <div>
                        <label class="form-label">Assigned To</label>
                        <input type="text" class="form-input" id="assignedTo" placeholder="Team name">
                    </div>
                </div>
                <button class="btn btn-success" onclick="createOrder()">➕ Create Order</button>
            </div>

            <div class="card">
                <div class="card-title">📦 All Orders</div>
                <div id="ordersContainer" class="loading">Loading orders...</div>
            </div>
        </div>

        <!-- Attendance Tab -->
        <div class="tab-content" id="attendanceTab">
            <div class="card">
                <div class="card-title">📋 Today's Attendance</div>
                <div id="attendanceContainer" class="loading">Loading attendance...</div>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_URL = 'http://localhost:3000/api'; // Change this to your deployed API URL
        let authToken = null;

        document.getElementById('apiServerDisplay').textContent = API_URL;

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const tabName = this.getAttribute('data-tab');
                
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                this.classList.add('active');
                document.getElementById(tabName + 'Tab').classList.add('active');

                if (tabName === 'orders') loadOrders();
                if (tabName === 'attendance') loadAttendance();
            });
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');

            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Logging in...';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/auth/admin_login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    authToken = data.token;
                    localStorage.setItem('adminToken', authToken);
                    localStorage.setItem('adminEmail', email);
                    
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('adminEmail').textContent = email;
                    
                    alert('✅ Login successful!');
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (error) {
                errorMsg.textContent = '❌ ' + error.message;
                errorMsg.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '🔐 Login as Admin';
            }
        });

        // Logout
        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminEmail');
            authToken = null;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('emailInput').value = '';
            document.getElementById('passwordInput').value = '';
        }

        // API Helper
        async function apiCall(endpoint, method = 'GET', body = null) {
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${authToken}`
                }
            };

            if (body) options.body = JSON.stringify(body);

            const response = await fetch(`${API_URL}${endpoint}`, options);
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'API request failed');
            }

            return data;
        }

        // Update Schedule
        async function updateSchedule() {
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;

            try {
                await apiCall('/schedule/create', 'POST', { startTime, endTime });
                alert('✅ Schedule updated successfully!');
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // Update Targets
        async function updateTargets() {
            const shrimp = document.getElementById('shrimpTarget').value;
            const squid = document.getElementById('squidTarget').value;

            try {
                await apiCall('/targets/create', 'POST', { shrimp, squid });
                alert('✅ Targets updated successfully!');
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // Create Order
        async function createOrder() {
            const customer = document.getElementById('customerName').value;
            const item = document.getElementById('itemType').value;
            const quantity = document.getElementById('quantity').value;
            const assignedTo = document.getElementById('assignedTo').value;

            if (!customer) {
                alert('❌ Customer name is required!');
                return;
            }

            try {
                await apiCall('/orders/create', 'POST', { customer, item, quantity, assignedTo });
                alert('✅ Order created successfully!');
                document.getElementById('customerName').value = '';
                document.getElementById('quantity').value = '10';
                document.getElementById('assignedTo').value = '';
                loadOrders();
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // Load Orders
        async function loadOrders() {
            const container = document.getElementById('ordersContainer');
            container.innerHTML = '<div class="loading">Loading orders...</div>';

            try {
                const data = await apiCall('/orders/all');
                
                if (data.orders.length === 0) {
                    container.innerHTML = '<div class="loading">No orders yet</div>';
                    return;
                }

                let html = '';
                data.orders.forEach(order => {
                    const statusClass = `status-${order.status}`;
                    const itemEmoji = order.item === 'shrimp' ? '🦐' : '🦑';
                    const itemName = order.item === 'shrimp' ? 'ကင်းမွန်' : 'ပုဇွန်';

                    html += `
                        <div class="order-item">
                            <div class="order-header">
                                <div>
                                    <div class="order-id">${order.orderNumber}</div>
                                    <div style="font-size: 0.875rem; color: #64748B;">Customer: ${order.customer}</div>
                                </div>
                                <span class="status-badge ${statusClass}">${order.status}</span>
                            </div>
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1rem;">
                                <div><strong>Item:</strong> ${itemEmoji} ${itemName} ${order.quantity} အလုံး</div>
                                <div><strong>Assigned:</strong> ${order.assignedTo || 'N/A'}</div>
                            </div>
                            <div style="display: flex; gap: 0.5rem;">
                                <select onchange="updateOrderStatus('${order.id}', this.value)">
                                    <option value="cleaning" ${order.status === 'cleaning' ? 'selected' : ''}>Cleaning</option>
                                    <option value="packed" ${order.status === 'packed' ? 'selected' : ''}>Packed</option>
                                    <option value="delivering" ${order.status === 'delivering' ? 'selected' : ''}>Delivering</option>
                                    <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Completed</option>
                                </select>
                                <button class="btn-danger" onclick="deleteOrder('${order.id}')">🗑️ Delete</button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div class="loading">Error: ${error.message}</div>`;
            }
        }

        // Update Order Status
        async function updateOrderStatus(orderId, status) {
            try {
                await apiCall(`/orders/${orderId}`, 'PUT', { status });
                alert('✅ Order status updated!');
            } catch (error) {
                alert('❌ Error: ' + error.message);
                loadOrders();
            }
        }

        // Delete Order
        async function deleteOrder(orderId) {
            if (!confirm('Are you sure you want to delete this order?')) return;

            try {
                await apiCall(`/orders/${orderId}`, 'DELETE');
                alert('✅ Order deleted!');
                loadOrders();
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // Load Attendance
        async function loadAttendance() {
            const container = document.getElementById('attendanceContainer');
            container.innerHTML = '<div class="loading">Loading attendance...</div>';

            try {
                const data = await apiCall('/attendance/today');
                
                if (data.attendance.length === 0) {
                    container.innerHTML = '<div class="loading">No attendance records today</div>';
                    return;
                }

                let html = '';
                data.attendance.forEach(att => {
                    const checkIn = att.checkIn ? new Date(att.checkIn).toLocaleTimeString() : '--:--';
                    const checkOut = att.checkOut ? new Date(att.checkOut).toLocaleTimeString() : '--:--';

                    html += `
                        <div class="order-item">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <div style="font-weight: 600;">${att.staffName}</div>
                                    <div style="font-size: 0.875rem; color: #64748B;">In: ${checkIn} | Out: ${checkOut}</div>
                                </div>
                                <button class="btn-danger" onclick="deleteAttendance('${att.id}')">🗑️</button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div class="loading">Error: ${error.message}</div>`;
            }
        }

        // Delete Attendance
        async function deleteAttendance(id) {
            if (!confirm('Delete this attendance record?')) return;

            try {
                await apiCall(`/attendance/${id}`, 'DELETE');
                alert('✅ Record deleted!');
                loadAttendance();
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // Check for saved token
        window.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('adminToken');
            const savedEmail = localStorage.getItem('adminEmail');

            if (savedToken && savedEmail) {
                authToken = savedToken;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('adminEmail').textContent = savedEmail;
            }
        });
    </script>
</body>
</html>
